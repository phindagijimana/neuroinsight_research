schema_version: 1
scope: phase2_published_images_only
notes:
  - "Includes only plugins backed by already-published phindagijimana321 images."
  - "Deferred plugins: qsiprep, qsirecon, xcpd (image publication pending)."

processors:
  - plugin_id: dcm2niix
    application_name: neuroinsight-dcm2niix
    source_url: docker://phindagijimana321/heudiconv:1.3.4
    application_type: processor
    compute_types: [ecs]
    resources: { cpu: 2, memory_gb: 8 }

  - plugin_id: fastsurfer
    application_name: neuroinsight-fastsurfer
    source_url: docker://phindagijimana321/fastsurfer:cpu-v2.4.2
    application_type: processor
    compute_types: [ecs]
    resources: { cpu: 4, memory_gb: 16 }

  - plugin_id: fmriprep
    application_name: neuroinsight-fmriprep
    source_url: docker://phindagijimana321/fmriprep:23.2.1
    application_type: processor
    compute_types: [ecs]
    resources: { cpu: 16, memory_gb: 64 }

  - plugin_id: freesurfer_autorecon_volonly
    application_name: neuroinsight-freesurfer-autorecon-volonly
    source_url: docker://phindagijimana321/freesurfer:7.4.1
    application_type: processor
    compute_types: [ecs]
    resources: { cpu: 8, memory_gb: 32 }

  - plugin_id: freesurfer_longitudinal
    application_name: neuroinsight-freesurfer-longitudinal
    source_url: docker://phindagijimana321/freesurfer:7.4.1
    application_type: processor
    compute_types: [ecs]
    resources: { cpu: 8, memory_gb: 48 }

  - plugin_id: freesurfer_longitudinal_stats
    application_name: neuroinsight-freesurfer-longitudinal-stats
    source_url: docker://phindagijimana321/freesurfer:7.4.1
    application_type: postprocessor
    compute_types: [ecs]
    resources: { cpu: 4, memory_gb: 16 }

  - plugin_id: freesurfer_recon
    application_name: neuroinsight-freesurfer-recon
    source_url: docker://phindagijimana321/freesurfer:7.4.1
    application_type: processor
    compute_types: [ecs]
    resources: { cpu: 8, memory_gb: 32 }

  - plugin_id: hs_postprocess
    application_name: neuroinsight-hs-postprocess
    source_url: docker://phindagijimana321/hs-postprocess:1.0.0
    application_type: postprocessor
    compute_types: [ecs]
    resources: { cpu: 4, memory_gb: 16 }

  - plugin_id: meld_graph
    application_name: neuroinsight-meld-graph
    source_url: docker://phindagijimana321/meld_graph:v2.2.4
    application_type: processor
    compute_types: [ecs]
    resources: { cpu: 4, memory_gb: 48 }

  - plugin_id: segmentha_t1
    application_name: neuroinsight-segmentha-t1
    source_url: docker://phindagijimana321/freesurfer-mcr:7.4.1
    application_type: processor
    compute_types: [ecs]
    resources: { cpu: 4, memory_gb: 16 }

  - plugin_id: segmentha_t2
    application_name: neuroinsight-segmentha-t2
    source_url: docker://phindagijimana321/freesurfer-mcr:7.4.1
    application_type: processor
    compute_types: [ecs]
    resources: { cpu: 4, memory_gb: 16 }

workflows_ready_now:
  - workflow_id: cortical_lesion_detection
    workflow_name: neuroinsight-cortical-lesion-detection
    processors:
      - id: freesurfer_recon
        plugin_id: freesurfer_recon
        depends_on: []
      - id: meld_graph
        plugin_id: meld_graph
        depends_on: [freesurfer_recon]

  - workflow_id: wf_freesurfer_longitudinal_full
    workflow_name: neuroinsight-freesurfer-longitudinal-full
    processors:
      - id: freesurfer_longitudinal
        plugin_id: freesurfer_longitudinal
        depends_on: []
      - id: freesurfer_longitudinal_stats
        plugin_id: freesurfer_longitudinal_stats
        depends_on: [freesurfer_longitudinal]

  - workflow_id: wf_hs_detection_v1
    workflow_name: neuroinsight-hs-detection
    processors:
      - id: freesurfer_autorecon_volonly
        plugin_id: freesurfer_autorecon_volonly
        depends_on: []
      - id: hs_postprocess
        plugin_id: hs_postprocess
        depends_on: [freesurfer_autorecon_volonly]

  - workflow_id: hippo_subfields_t1
    workflow_name: neuroinsight-hippo-subfields-t1
    processors:
      - id: freesurfer_recon
        plugin_id: freesurfer_recon
        depends_on: []
      - id: segmentha_t1
        plugin_id: segmentha_t1
        depends_on: [freesurfer_recon]

  - workflow_id: hippo_subfields_t2
    workflow_name: neuroinsight-hippo-subfields-t2
    processors:
      - id: freesurfer_recon
        plugin_id: freesurfer_recon
        depends_on: []
      - id: segmentha_t2
        plugin_id: segmentha_t2
        depends_on: [freesurfer_recon]

workflows_blocked_until_remaining_images:
  - workflow_id: fmri_full
    blocked_by_plugins: [xcpd]
  - workflow_id: diffusion_full
    blocked_by_plugins: [qsiprep, qsirecon]
