# Workflow 9: Focal Cortical Lesion Detection (Epilepsy Research)
id: cortical_lesion_detection
name: "Focal Cortical Lesion Detection"
version: "1.0.0"
type: workflow
domain: epilepsy

description: >
  Epilepsy research workflow: FreeSurfer recon-all followed by MELD Graph
  focal cortical dysplasia detection. Produces lesion probability maps and
  detection metrics.

developer_contract: >
  Workflows only orchestrate plugins. No direct execution steps allowed.

inputs:
  required:
    - key: input_dir
      type: directory
      description: >
        Directory containing T1w and optionally FLAIR NIfTI files.
        Also accepts a single T1w file (backward compatible).
  optional:
    - key: subject_id
      type: string
      default: "subject"
    - key: fs_license
      type: path
    - key: threshold
      type: float
      default: 0.5

input_format:
  format_name: "Directory with T1w + optional FLAIR"
  description: >
    A directory containing a T1-weighted MRI scan and optionally a FLAIR scan.
    FLAIR improves lesion detection accuracy but is not required.
    Also supports submitting a single T1w file directly.
  example_structure: |
    input_folder/
      sub-01_T1w.nii.gz
      sub-01_FLAIR.nii.gz       (optional, improves detection)
  notes:
    - "T1w file is required (detected by 'T1w' or 'T1' in filename)"
    - "FLAIR file is optional (detected by 'FLAIR' or 'flair' in filename)"
    - "If submitting a single file, use Single input mode"

validation:
  preflight_checks:
    - "directory_exists(input_dir) or file_exists(input_dir)"

steps:
  - id: recon_all
    uses: freesurfer_recon
    with:
      input_dir: "{inputs.input_dir}"
      subject_id: "{inputs.subject_id}"
      fs_license: "{inputs.fs_license}"

  - id: meld
    uses: meld_graph
    with:
      freesurfer_subjects_dir: "{step.recon_all.outputs.subjects_dir}"
      subject_id: "{inputs.subject_id}"
      input_dir: "{inputs.input_dir}"
      threshold: "{inputs.threshold}"

outputs:
  native:
    - "{run_root}/native/freesurfer"
    - "{run_root}/native/meld"
  bundle:
    - "{run_root}/bundle"

reproducibility:
  pin_containers: true
  write_run_manifest: true
  store_exact_commands: true
