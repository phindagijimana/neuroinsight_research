name: Desktop Release (Multi-Platform)

on:
  workflow_dispatch:
    inputs:
      publish_to_release:
        description: "Attach artifacts to GitHub Release when tag build runs"
        required: false
        default: "false"
  push:
    tags:
      - "desktop-v*"

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform_name: linux
            build_cmd: npm run dist:linux:ci
            artifact_glob: |
              desktop/dist/*.AppImage
              desktop/dist/*.deb
              desktop/dist/install-nir-linux.sh
              desktop/dist/*.yml
              desktop/dist/*.yaml
              desktop/dist/desktop-release-metadata.json
              desktop/dist/desktop-release-sha256.txt
              desktop/dist/desktop-release-metadata-linux.json
              desktop/dist/desktop-release-sha256-linux.txt
          - os: windows-latest
            platform_name: windows
            build_cmd: npm run dist:win:ci
            artifact_glob: |
              desktop/dist/*.exe
              desktop/dist/*.msi
              desktop/dist/install-nir-windows.ps1
              desktop/dist/install-nir-windows.cmd
              desktop/dist/*.yml
              desktop/dist/*.yaml
              desktop/dist/desktop-release-metadata.json
              desktop/dist/desktop-release-sha256.txt
              desktop/dist/desktop-release-metadata-windows.json
              desktop/dist/desktop-release-sha256-windows.txt
          - os: macos-latest
            platform_name: macos
            build_cmd: npm run dist:mac:ci
            artifact_glob: |
              desktop/dist/*.dmg
              desktop/dist/*.pkg
              desktop/dist/*.zip
              desktop/dist/install-nir-macos.sh
              desktop/dist/*.yml
              desktop/dist/*.yaml
              desktop/dist/desktop-release-metadata.json
              desktop/dist/desktop-release-sha256.txt
              desktop/dist/desktop-release-metadata-macos.json
              desktop/dist/desktop-release-sha256-macos.txt
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install desktop dependencies
        working-directory: desktop/app
        run: npm install --no-audit --no-fund

      - name: Validate desktop sources
        working-directory: desktop/app
        run: npm run check

      # Signing is currently SKIPPED (no certs). Warn — don't fail — so unsigned
      # pilot releases can ship; integrity is provided by SHA256SUMS.txt and the
      # baked-in app-integrity manifest. To enforce signing later, add the
      # secrets (docs/SIGNING_AND_TRUST.md); when present, builds sign + notarize
      # automatically.
      - name: Signing status (warn if unsigned)
        if: startsWith(github.ref, 'refs/tags/desktop-v') && (github.event_name == 'push' || github.event.inputs.publish_to_release == 'true')
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
        run: |
          case "${{ matrix.platform_name }}" in
            macos)
              if [ -z "$CSC_LINK" ]; then
                echo "::warning::Unsigned/un-notarized macOS build — users must right-click → Open on first launch (see docs/INSTALL.md). Add signing secrets to remove the warning."
              fi ;;
            windows)
              if [ -z "$WIN_CSC_LINK" ]; then
                echo "::warning::Unsigned Windows build — users will see SmartScreen (More info → Run anyway). Add WIN_CSC_LINK to sign."
              fi ;;
            linux)
              echo "Linux AppImage/deb: no signing needed; integrity via the published SHA-256 checksums." ;;
          esac

      - name: Build desktop artifacts
        working-directory: desktop/app
        # Signing is driven by these secrets when present; absent => unsigned
        # fallback (electron-builder skips signing, notarize hook is a no-op).
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # On macOS, avoid keychain identity auto-discovery when no cert is provided.
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' }}
        run: ${{ matrix.build_cmd }}

      - name: Generate checksums and metadata
        run: node desktop/ops/release_metadata.js desktop/dist desktop/dist ${{ matrix.platform_name }}

      - name: Stage verified install helper
        run: node desktop/ops/stage_install_helper.js desktop/dist ${{ matrix.platform_name }}

      - name: Verify platform artifact set
        run: node desktop/ops/verify_release_artifacts.js desktop/dist ${{ matrix.platform_name }}

      - name: Verify release checksums
        run: node desktop/ops/verify_release_checksums.js desktop/dist ${{ matrix.platform_name }}

      - name: Verify trust (signing / notarization)
        shell: bash
        # Enforce signing only when the platform's signing secret is configured;
        # otherwise report unsigned (allowed) so the internal/pilot path passes.
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
        run: |
          REQ=""
          if [ "${{ matrix.platform_name }}" = "macos" ] && [ -n "$CSC_LINK" ]; then REQ="--require-signed"; fi
          if [ "${{ matrix.platform_name }}" = "windows" ] && [ -n "$WIN_CSC_LINK" ]; then REQ="--require-signed"; fi
          node desktop/ops/verify_trust.js desktop/dist ${{ matrix.platform_name }} $REQ

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nir-desktop-${{ matrix.platform_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

      - name: Attach artifacts to GitHub release
        if: startsWith(github.ref, 'refs/tags/desktop-v') && (github.event_name == 'push' || github.event.inputs.publish_to_release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_glob }}
