name: Desktop Release (Multi-Platform)

on:
  workflow_dispatch:
    inputs:
      publish_to_release:
        description: "Attach artifacts to GitHub Release when tag build runs"
        required: false
        default: "false"
  push:
    tags:
      - "desktop-v*"

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform_name: linux
            build_cmd: npm run dist:linux:ci
            artifact_glob: |
              desktop/dist/*.AppImage
              desktop/dist/*.deb
              desktop/dist/install-nir-linux.sh
              desktop/dist/*.yml
              desktop/dist/*.yaml
              desktop/dist/desktop-release-metadata.json
              desktop/dist/desktop-release-sha256.txt
              desktop/dist/desktop-release-metadata-linux.json
              desktop/dist/desktop-release-sha256-linux.txt
          - os: windows-latest
            platform_name: windows
            build_cmd: npm run dist:win:ci
            artifact_glob: |
              desktop/dist/*.exe
              desktop/dist/*.msi
              desktop/dist/install-nir-windows.ps1
              desktop/dist/install-nir-windows.cmd
              desktop/dist/*.yml
              desktop/dist/*.yaml
              desktop/dist/desktop-release-metadata.json
              desktop/dist/desktop-release-sha256.txt
              desktop/dist/desktop-release-metadata-windows.json
              desktop/dist/desktop-release-sha256-windows.txt
          - os: macos-latest
            platform_name: macos
            build_cmd: npm run dist:mac:ci
            artifact_glob: |
              desktop/dist/*.dmg
              desktop/dist/*.pkg
              desktop/dist/*.zip
              desktop/dist/install-nir-macos.sh
              desktop/dist/*.yml
              desktop/dist/*.yaml
              desktop/dist/desktop-release-metadata.json
              desktop/dist/desktop-release-sha256.txt
              desktop/dist/desktop-release-metadata-macos.json
              desktop/dist/desktop-release-sha256-macos.txt
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install desktop dependencies
        working-directory: desktop/app
        run: npm install --no-audit --no-fund

      - name: Validate desktop sources
        working-directory: desktop/app
        run: npm run check

      - name: Determine signing mode
        id: signing
        shell: bash
        run: |
          enabled=false
          reason="Unsigned build (signing secrets not configured for this platform)."
          if [ "${{ matrix.platform_name }}" = "macos" ]; then
            if [ -n "${CSC_LINK:-}" ] && [ -n "${CSC_KEY_PASSWORD:-}" ] && [ -n "${APPLE_ID:-}" ] && [ -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" ] && [ -n "${APPLE_TEAM_ID:-}" ]; then
              enabled=true
              reason="macOS signing/notarization secrets detected."
            fi
          elif [ "${{ matrix.platform_name }}" = "windows" ]; then
            if [ -n "${WIN_CSC_LINK:-}" ] && [ -n "${WIN_CSC_KEY_PASSWORD:-}" ]; then
              enabled=true
              reason="Windows code-signing secrets detected."
            fi
          fi
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"
          echo "Signing mode: $reason"

      - name: Build desktop artifacts
        working-directory: desktop/app
        run: ${{ matrix.build_cmd }}

      - name: Generate checksums and metadata
        run: node desktop/ops/release_metadata.js desktop/dist desktop/dist ${{ matrix.platform_name }}

      - name: Stage verified install helper
        run: node desktop/ops/stage_install_helper.js desktop/dist ${{ matrix.platform_name }}

      - name: Verify platform artifact set
        run: node desktop/ops/verify_release_artifacts.js desktop/dist ${{ matrix.platform_name }}

      - name: Verify release checksums
        run: node desktop/ops/verify_release_checksums.js desktop/dist ${{ matrix.platform_name }}

      - name: Verify Windows signature
        if: matrix.platform_name == 'windows' && steps.signing.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $exe = Get-ChildItem desktop/dist/*.exe | Select-Object -First 1
          if (-not $exe) { throw "No .exe artifact found for signature verification." }
          $sig = Get-AuthenticodeSignature $exe.FullName
          if ($sig.Status -ne "Valid") {
            throw "Authenticode signature invalid for $($exe.Name): $($sig.Status)"
          }
          Write-Host "Verified signature for $($exe.Name): $($sig.SignerCertificate.Subject)"

      - name: Verify macOS signing and notarization
        if: matrix.platform_name == 'macos' && steps.signing.outputs.enabled == 'true'
        shell: bash
        run: |
          dmg="$(ls desktop/dist/*.dmg | head -n 1)"
          if [ -z "$dmg" ]; then
            echo "No .dmg artifact found for signing verification." >&2
            exit 1
          fi
          codesign -dv --verbose=4 "$dmg"
          xcrun stapler validate "$dmg"

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nir-desktop-${{ matrix.platform_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

      - name: Attach artifacts to GitHub release
        if: startsWith(github.ref, 'refs/tags/desktop-v') && (github.event_name == 'push' || github.event.inputs.publish_to_release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_glob }}
