name: All-in-One Image (GHCR)

# Builds and publishes the single all-in-one container the desktop app launches
# (docker/allinone/Dockerfile) to GHCR. Multi-arch (amd64 + arm64), version-pinned
# so the desktop can pull ghcr.io/<owner>/nir-allinone:v<appVersion>.

on:
  workflow_dispatch:
  push:
    tags:
      - "nir-v*"

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/nir-allinone
          tags: |
            type=ref,event=tag
            type=match,pattern=nir-v(.*),group=1,prefix=v
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/allinone/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
