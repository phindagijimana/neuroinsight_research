name: Desktop Reliability Gate (Phase 7)

# Enforces the pilot reliability gate before GA advancement. Until a real pilot
# report is committed at desktop/ops/pilot_reliability_report.json, the job skips
# cleanly. Once present, it blocks on `no_go` (e.g. any unresolved P0/P1).

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "desktop/ops/pilot_reliability_report.json"
      - "desktop/ops/evaluate_pilot_gate.js"
      - "desktop/ops/capture_gate_result.js"

jobs:
  reliability-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Evaluate pilot reliability gate
        shell: bash
        run: |
          REPORT=desktop/ops/pilot_reliability_report.json
          if [ ! -f "$REPORT" ]; then
            echo "No pilot reliability report yet ($REPORT) — pilot not run; skipping gate."
            exit 0
          fi
          echo "==> Gate (JSON):"
          node desktop/ops/evaluate_pilot_gate.js "$REPORT" --json
          echo "==> Capturing decision for go-live record:"
          node desktop/ops/capture_gate_result.js "$REPORT" desktop/ops

      - name: Upload gate decision
        if: always() && hashFiles('desktop/ops/pilot_gate_result.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: pilot-gate-result
          path: |
            desktop/ops/pilot_gate_result.json
            desktop/ops/GO_LIVE_DECISION.md
