# Plugin: BEM + volume source space (MNE + FreeSurfer watershed)
id: bem_source_space
name: "EEG BEM & Source Space"
version: "1.0.0"
type: plugin
domain: eeg_imaging

visibility:
  user_selectable: true
  ui_category: primary
  ui_label: "BEM & Source Space (MNE)"

description: >
  Builds subject-specific BEM (bem_sol.fif) and a BEM-bounded volume source space
  (src.fif) from staged T1w.nii.gz using FreeSurfer watershed and MNE. Run before
  forward_model when you want subject anatomy instead of sphere/volume-grid fallbacks.

authors:
  - "NeuroInsight Research Team"

references:
  - "https://mne.tools/stable/auto_tutorials/forward/"

container:
  runtime: docker
  image: "phindagijimana321/eeg-bem-source-space-mne:1.0.0"
  digest: "sha256:bb7eb200417eaa9d1b72ed3253baaf7513c23b51ffdfdee587bc7205398a3793"

inputs:
  required: []
  optional: []

input_format:
  format_name: "T1 NIfTI"
  description: >
    Staged T1w.nii.gz or T1.nii.gz (same multimodal folder as EEG). Optional
    metadata/bem_source_config.yaml for subject_id, volume_grid_mm, ico.

parameters: []

resources:
  profiles:
    default:
      cpus: 4
      mem_gb: 32
      time_hours: 8
      gpus: 0

execution:
  style: single_stage
  workdirs:
    native_root: "{run_root}/native/bem_source_space"
    logs_dir: "{run_root}/logs/bem_source_space"
  stages:
    - id: bem_src
      kind: single
      profile: default
      command_template: |
        #!/bin/bash
        set -e
        export FS_LICENSE="${FS_LICENSE:-/opt/freesurfer/license.txt}"
        export NIR_INPUT_ROOT=/data/inputs
        export NIR_OUTPUT_ROOT=/data/outputs/native/bem_source_space
        mkdir -p "$NIR_OUTPUT_ROOT" /data/outputs/logs/bem_source_space
        python3 /app/run.py

provenance:
  write_run_manifest: true
  record_exact_commands: true
  record_container_digest: true
