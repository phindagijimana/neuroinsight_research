# Plugin: Forward model / lead field (MNE)
id: forward_model
name: "EEG Forward Model"
version: "1.0.0"
type: plugin
domain: eeg_imaging

visibility:
  user_selectable: true
  ui_category: primary
  ui_label: "EEG Forward Model"

description: >
  Computes the MNE forward solution from cleaned EEG, the head-to-MRI transform, and an optional source space and head model. Falls back to a reproducible spherical head model and volume source grid when those are not provided.

authors:
  - "NeuroInsight Research Team"

references:
  - "https://mne.tools/stable/auto_tutorials/forward/"

container:
  runtime: docker
  image: "phindagijimana321/eeg-forward-model-mne:1.0.10"
  digest: "sha256:ad8ee2781cbc95927e3eb6c026c51effc2c97d0909c1778806e6dd51d54b03de"

inputs:
  required: []
  optional: []

input_format:
  format_name: "FIF + trans + src + BEM"
  description: "See eeg/docker/README.md (forward model inputs)."

parameters: []

resources:
  profiles:
    default:
      cpus: 4
      mem_gb: 16
      time_hours: 4
      gpus: 0

execution:
  style: single_stage
  workdirs:
    native_root: "{run_root}/native/forward_model"
    logs_dir: "{run_root}/logs/forward_model"
  stages:
    - id: forward
      kind: single
      profile: default
      command_template: |
        #!/bin/bash
        set -e
        export NIR_INPUT_ROOT=/data/inputs
        export NIR_OUTPUT_ROOT=/data/outputs/native/forward_model
        mkdir -p "$NIR_OUTPUT_ROOT" /data/outputs/logs/forward_model
        python /app/run.py

provenance:
  write_run_manifest: true
  record_exact_commands: true
  record_container_digest: true
