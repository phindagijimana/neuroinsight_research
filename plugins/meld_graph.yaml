# Plugin 10: Focal Cortical Lesion Detection
id: meld_graph
name: "Focal Cortical Lesion Detection"
version: "2.2.4"
type: plugin
domain: epilepsy

visibility:
  user_selectable: true
  ui_category: primary
  ui_label: "Focal Cortical Lesion Detection"

description: >
  Focal cortical dysplasia detection for drug-resistant epilepsy using
  graph neural networks (Wagstyl et al., 2025). Operates on FreeSurfer
  recon-all outputs to produce lesion probability maps and detection
  reports. Uses a NeuroInsight-managed MELD Graph Docker image derived
  from meldproject/meld_graph and pinned for deterministic production runs,
  which bundles FreeSurfer 7.2, FastSurfer 1.1.2, and the MELD
  classifier. On HPC, runs via Apptainer/Singularity.

authors:
  - "Mathilde Ripart, Hannah Spitzer, Sophie Adler, Konrad Wagstyl"
  - "MELD Project (meld.study@gmail.com)"

references:
  - "Ripart, M. et al. (2025). Detection of epileptogenic focal cortical dysplasia using graph neural networks: a MELD study. JAMA Neurology."
  - "Spitzer, H., Ripart, M. et al. (2022). Interpretable surface-based detection of focal cortical dysplasias. Brain, 145(11)."
  - "https://github.com/MELDProject/meld_graph"

container:
  runtime: docker
  image: "meldproject/meld_graph:v2.2.4"
  # HPC: pull with `apptainer pull docker://meldproject/meld_graph:v2.2.4`
  # Result: meld_graph_v2.2.4.sif (~13 GB)

inputs:
  required:
    - key: freesurfer_subjects_dir
      type: path
      description: "FreeSurfer SUBJECTS_DIR with completed recon-all output"
    - key: subject_id
      type: string
      description: "Subject identifier within SUBJECTS_DIR"
    - key: fs_license
      type: path
      description: "FreeSurfer license file (get free at https://surfer.nmr.mgh.harvard.edu/registration.html)"
    - key: meld_license
      type: path
      description: "MELD Graph license file (register at https://docs.google.com/forms/d/e/1FAIpQLSdocMWtxbmh9T7Sv8NT4f0Kpev-tmRI-kngDhUeBF9VcZXcfg/viewform)"
  optional:
    - key: input_dir
      type: directory
      description: "Directory containing T1w (and optionally FLAIR) NIfTI files for the subject"
    - key: fastsurfer
      type: bool
      default: false
      description: "Use FastSurfer instead of FreeSurfer for segmentation (faster if GPU available)"

input_format:
  format_name: "FreeSurfer SUBJECTS_DIR"
  description: "A FreeSurfer SUBJECTS_DIR with completed recon-all for the subject."
  notes:
    - "Full recon-all must be completed (not just segmentation)"
    - "Surface files (lh.white, rh.white, lh.pial, rh.pial) are required"
    - "FLAIR images improve lesion detection but are optional"
    - "Requires FreeSurfer license: https://surfer.nmr.mgh.harvard.edu/registration.html"
    - "Requires MELD license (v2.2.4+): https://docs.google.com/forms/d/e/1FAIpQLSdocMWtxbmh9T7Sv8NT4f0Kpev-tmRI-kngDhUeBF9VcZXcfg/viewform"
  example_structure: |
    freesurfer_subjects_dir/
      sub-01/
        mri/
          orig.mgz
          brain.mgz
          aseg.mgz
        surf/
          lh.white
          rh.white
          lh.pial
          rh.pial
          lh.thickness
          rh.thickness
  file_types:
    - ".mgz (FreeSurfer volume format)"
    - "lh.* / rh.* (surface files)"

parameters:
  - name: threshold
    type: float
    default: 0.5
    min_value: 0.1
    max_value: 0.9
    description: "Detection threshold for lesion probability"

resources:
  profiles:
    default:
      cpus: 4
      mem_gb: 48
      time_hours: 2
      gpus: 0
    gpu:
      cpus: 4
      mem_gb: 48
      time_hours: 1
      gpus: 1

execution:
  style: single_stage
  workdirs:
    native_root: "{run_root}/native/meld"
    logs_dir: "{run_root}/logs/meld"

  stages:
    - id: meld_run
      kind: single
      profile: default
      command_template: |
        #!/bin/bash
        set -e

        # Apptainer does not honour Docker WORKDIR; MELD uses relative
        # paths (e.g. data/icospheres/) that resolve from /app.
        cd /app

        # Prevent user site-packages from shadowing container libraries
        # (e.g. nibabel 5.x breaking get_data() calls).
        export PYTHONNOUSERSITE=1

        mkdir -p /data/outputs/native/meld
        mkdir -p /data/outputs/logs/meld

        # -- Ensure MELD cache (auto-bootstrap on first run) ---------------
        mkdir -p /data/meld_params /data/models
        NEED_PARAMS=0
        NEED_MODELS=0
        if [ ! -f "/data/meld_params/fsaverage_sym/surf/lh.inflated" ] || \
           [ ! -f "/data/meld_params/fsaverage_sym/surf/rh.inflated" ]; then
          NEED_PARAMS=1
        fi
        if [ ! -d "/data/models" ] || [ -z "$(ls -A /data/models 2>/dev/null)" ]; then
          NEED_MODELS=1
        fi

        if [ "$NEED_PARAMS" -eq 1 ] || [ "$NEED_MODELS" -eq 1 ]; then
          echo "MELD cache missing or incomplete; preparing it now ..."
          LOCK_FILE="/data/meld_params/.nir_meld_prepare.lock"
          if command -v flock >/dev/null 2>&1; then
            exec 9>"$LOCK_FILE"
            flock 9
          fi

          # Re-check after lock in case another worker populated cache.
          NEED_PARAMS=0
          NEED_MODELS=0
          if [ ! -f "/data/meld_params/fsaverage_sym/surf/lh.inflated" ] || \
             [ ! -f "/data/meld_params/fsaverage_sym/surf/rh.inflated" ]; then
            NEED_PARAMS=1
          fi
          if [ ! -d "/data/models" ] || [ -z "$(ls -A /data/models 2>/dev/null)" ]; then
            NEED_MODELS=1
          fi

          if [ "$NEED_PARAMS" -eq 1 ]; then
            python /app/meld_graph/download_data.py --params 2>/dev/null \
            || python -c "from pathlib import Path; import meld_graph.download_data as d; p=Path('/app/meld_graph/download_data.py'); s=p.read_text(); s=s.replace('percent = int(count*blockSize*100/totalSize)','percent = int(count*blockSize*100/totalSize) if totalSize else 0'); p.write_text(s); d.get_meld_params()"
          fi
          if [ "$NEED_MODELS" -eq 1 ]; then
            python /app/meld_graph/download_data.py --model 2>/dev/null \
            || python -c "from pathlib import Path; import meld_graph.download_data as d; p=Path('/app/meld_graph/download_data.py'); s=p.read_text(); s=s.replace('percent = int(count*blockSize*100/totalSize)','percent = int(count*blockSize*100/totalSize) if totalSize else 0'); p.write_text(s); d.get_model()"
          fi
        fi

        # Final hard validation before processing
        if [ ! -f "/data/meld_params/fsaverage_sym/surf/lh.inflated" ] || \
           [ ! -f "/data/meld_params/fsaverage_sym/surf/rh.inflated" ]; then
          echo "ERROR: Missing MELD params cache after auto-prepare attempt." >&2
          exit 1
        fi
        if [ ! -d "/data/models" ] || [ -z "$(ls -A /data/models 2>/dev/null)" ]; then
          echo "ERROR: Missing MELD model cache after auto-prepare attempt." >&2
          exit 1
        fi

        # -- Stage T1w input ------------------------------------------------
        # MELD requires exactly one T1 file per modality; derived files
        # (labels, masks, ROIs) are excluded to avoid an abort.
        mkdir -p /data/input/{subject_id}/T1
        if [ -d "/data/inputs/input_dir" ]; then
          for f in /data/inputs/input_dir/*T1*nii* /data/inputs/input_dir/*t1*nii*; do
            [ -e "$f" ] || continue
            case "$(basename "$f")" in
              *label*|*mask*|*roi*|*lesion*|*seg*) continue ;;
            esac
            ln -sf "$f" /data/input/{subject_id}/T1/
          done
          mkdir -p /data/input/{subject_id}/FLAIR
          for f in /data/inputs/input_dir/*FLAIR*nii* /data/inputs/input_dir/*flair*nii*; do
            [ -e "$f" ] || continue
            case "$(basename "$f")" in
              *label*|*mask*|*roi*|*lesion*|*seg*) continue ;;
            esac
            ln -sf "$f" /data/input/{subject_id}/FLAIR/
          done
          rmdir /data/input/{subject_id}/FLAIR 2>/dev/null || true
        elif [ -f "/data/inputs/T1w.nii.gz" ]; then
          ln -sf /data/inputs/T1w.nii.gz /data/input/{subject_id}/T1/T1w.nii.gz
        fi

        # -- Copy FreeSurfer output (MELD writes into this tree) ------------
        mkdir -p /data/output/fs_outputs
        if [ -d "/data/inputs/freesurfer_subjects_dir/{subject_id}" ]; then
          echo "Copying FreeSurfer results to writable location..."
          cp -a /data/inputs/freesurfer_subjects_dir/{subject_id} \
                /data/output/fs_outputs/{subject_id}
          chmod -R u+w /data/output/fs_outputs/{subject_id}
        fi

        # -- Run MELD -------------------------------------------------------
        MELD_CMD="python /app/scripts/new_patient_pipeline/new_pt_pipeline.py"
        MELD_CMD="$MELD_CMD -id {subject_id}"

        if [ "{fastsurfer}" = "true" ] || [ "{fastsurfer}" = "True" ]; then
          MELD_CMD="$MELD_CMD --fastsurfer"
        fi

        echo "Running MELD Graph: $MELD_CMD"
        eval $MELD_CMD

        # -- Collect outputs ------------------------------------------------
        for src_dir in \
          /data/output/predictions_reports/{subject_id} \
          /data/output/predictions_reports; do
          if [ -d "$src_dir" ] && [ "$(ls -A "$src_dir" 2>/dev/null)" ]; then
            cp -r "$src_dir"/* /data/outputs/native/meld/ 2>/dev/null || true
            break
          fi
        done

        if [ -d "/data/logs" ]; then
          cp -r /data/logs/* /data/outputs/logs/meld/ 2>/dev/null || true
        fi

        echo "Focal Cortical Lesion Detection completed successfully"

native_outputs:
  preserved: true
  layout: "native/meld/{subject_id}/"

bundle:
  bundle_version: 1
  root: "{run_root}/bundle"
  extraction:
    volumes:
      - from: "{native_root}/predictions/*lesion*.nii.gz"
        to: "{bundle.root}/volumes/"
        method: copy
    metrics:
      - from: "{native_root}/predictions/*metrics*.json"
        to: "{bundle.root}/metrics/"
        method: copy
    qc:
      - from: "{native_root}/predictions/reports/*.pdf"
        to: "{bundle.root}/qc/"
        method: copy

provenance:
  write_run_manifest: true
  record_exact_commands: true
  record_container_digest: true
  record_inputs_hashes: true
