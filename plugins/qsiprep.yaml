# Plugin 8: QSIPrep
id: qsiprep
name: "QSIPrep"
version: "0.20.0"
type: plugin
domain: diffusion_mri

visibility:
  user_selectable: true
  ui_category: primary
  ui_label: "QSIPrep"

description: >
  Preprocessing of diffusion MRI data including distortion correction,
  motion correction, coregistration, and quality control reporting.

authors:
  - "NeuroInsight Research Team"
  - "Based on QSIPrep (Cieslak et al., 2021)"

references:
  - "Cieslak, M., et al. (2021). QSIPrep: an integrative platform for preprocessing and reconstructing diffusion MRI data. Nature Methods, 18(7), 775-778."

container:
  runtime: docker
  image: "pennbbl/qsiprep:0.20.0"
  digest: "sha256:3736fdd73342671de8e7a8f4b20fc50cd998fdbf40e46124bde2e28daa14d5c9"

inputs:
  required:
    - key: bids_dir
      type: directory
      description: "BIDS-formatted dataset directory with DWI data"
    - key: subject_id
      type: string
      description: "Subject identifier (without 'sub-' prefix)"
  optional:
    - key: fs_license
      type: path
      description: "FreeSurfer license file path"

input_format:
  format_name: "BIDS (with DWI)"
  description: "Brain Imaging Data Structure with diffusion-weighted imaging data."
  notes:
    - "Must include DWI data (dwi/ directory) for the subject"
    - "Requires .bval and .bvec files alongside the DWI NIfTI"
    - "An anatomical T1w scan is recommended but not required"
  example_structure: |
    bids_dir/
      dataset_description.json
      sub-01/
        anat/
          sub-01_T1w.nii.gz
        dwi/
          sub-01_dwi.nii.gz
          sub-01_dwi.bval
          sub-01_dwi.bvec
          sub-01_dwi.json
  file_types:
    - ".nii.gz (NIfTI images)"
    - ".bval (b-value table)"
    - ".bvec (gradient directions)"
    - ".json (BIDS sidecar metadata)"

parameters:
  - name: output_resolution
    type: float
    default: 1.5
    min_value: 0.5
    max_value: 5.0
    description: "Isotropic voxel size (mm) for outputs"
  - name: denoise
    type: bool
    default: true
    description: "Apply denoising (Veraart et al., 2016)"
  - name: unringing
    type: bool
    default: true
    description: "Apply Gibbs unringing (Kellner et al., 2016)"
  - name: hmc_model
    type: choice
    default: eddy
    choices: ["eddy", "3dSHORE", "none"]
    description: "Head motion correction model"
  - name: combine_all_dwis
    type: bool
    default: true
    description: "Combine all DWI series into a single output"

resources:
  profiles:
    default:
      cpus: 8
      mem_gb: 32
      time_hours: 8
      gpus: 0

execution:
  style: single_stage
  workdirs:
    native_root: "{run_root}/native/qsiprep"
    logs_dir: "{run_root}/logs/qsiprep"

  stages:
    - id: qsiprep_run
      kind: single
      profile: default
      command_template: |
        #!/bin/bash
        set -e

        mkdir -p /data/outputs/native/qsiprep
        mkdir -p /data/outputs/logs/qsiprep
        mkdir -p /data/outputs/work/qsiprep
        mkdir -p /data/outputs/bundle/provenance

        # Non-blocking metadata audit for provenance visibility.
        AUDIT_FILE="/data/outputs/bundle/provenance/metadata_audit.txt"
        SUBJECT_ID="{subject_id}"
        {
          echo "NeuroInsight metadata audit"
          echo "pipeline: qsiprep"
          echo "subject: sub-${SUBJECT_ID}"
          echo "bids_dir: /data/inputs/bids_dir"
          echo "timestamp_utc: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo
        } > "$AUDIT_FILE"

        echo "status: WARN_AND_CONTINUE" >> "$AUDIT_FILE"
        SUBJ_DIR="/data/inputs/bids_dir/sub-${SUBJECT_ID}"
        if [ ! -d "$SUBJ_DIR" ]; then
          echo "WARNING: subject directory missing: $SUBJ_DIR" >> "$AUDIT_FILE"
        else
          echo "[qsiprep_dwi_json_keys]" >> "$AUDIT_FILE"
          DWI_JSON_COUNT=0
          while IFS= read -r jf; do
            [ -n "$jf" ] || continue
            DWI_JSON_COUNT=$((DWI_JSON_COUNT + 1))
            missing=""
            for key in PhaseEncodingDirection TotalReadoutTime EchoTime; do
              if ! grep -q "\"$key\"" "$jf"; then
                missing="${missing}${key}, "
              fi
            done
            if [ -z "$missing" ]; then
              echo "- ${jf#/data/inputs/bids_dir/} :: OK" >> "$AUDIT_FILE"
            else
              echo "- ${jf#/data/inputs/bids_dir/} :: MISSING ${missing%, }" >> "$AUDIT_FILE"
            fi
            for key in PhaseEncodingDirection TotalReadoutTime EchoTime EffectiveEchoSpacing; do
              if grep -q "\"$key\"" "$jf"; then
                raw="$(grep -m1 "\"$key\"" "$jf" | sed -E "s/.*\"$key\"[[:space:]]*:[[:space:]]*(.*)[[:space:]]*$/\\1/" | sed -E "s/[[:space:]]*,[[:space:]]*$//")"
                echo "    $key: $raw" >> "$AUDIT_FILE"
              else
                echo "    $key: <missing>" >> "$AUDIT_FILE"
              fi
            done
          done < <(find "$SUBJ_DIR" -path "*/dwi/*_dwi.json" -type f 2>/dev/null | sort)
          if [ "$DWI_JSON_COUNT" -eq 0 ]; then
            echo "WARNING: no DWI JSON sidecars found" >> "$AUDIT_FILE"
          fi
          echo >> "$AUDIT_FILE"

          echo "[qsiprep_gradient_tables]" >> "$AUDIT_FILE"
          DWI_IMG_COUNT=0
          while IFS= read -r nii; do
            [ -n "$nii" ] || continue
            DWI_IMG_COUNT=$((DWI_IMG_COUNT + 1))
            stem="$nii"
            stem="${stem%.nii.gz}"
            stem="${stem%.nii}"
            missing=""
            [ -f "${stem}.bval" ] || missing="${missing}.bval, "
            [ -f "${stem}.bvec" ] || missing="${missing}.bvec, "
            if [ -z "$missing" ]; then
              echo "- ${nii#/data/inputs/bids_dir/} :: OK" >> "$AUDIT_FILE"
            else
              echo "- ${nii#/data/inputs/bids_dir/} :: MISSING ${missing%, }" >> "$AUDIT_FILE"
            fi
          done < <(find "$SUBJ_DIR" -type f \( -path "*/dwi/*_dwi.nii.gz" -o -path "*/dwi/*_dwi.nii" \) 2>/dev/null | sort)
          if [ "$DWI_IMG_COUNT" -eq 0 ]; then
            echo "WARNING: no DWI image files found" >> "$AUDIT_FILE"
          fi
        fi
        echo >> "$AUDIT_FILE"
        echo "note: this audit is informational and does not block execution." >> "$AUDIT_FILE"

        QSIPREP_CMD="qsiprep /data/inputs/bids_dir /data/outputs/native/qsiprep participant"
        QSIPREP_CMD="$QSIPREP_CMD --work-dir /data/outputs/work/qsiprep"
        QSIPREP_CMD="$QSIPREP_CMD --participant-label {subject_id}"
        QSIPREP_CMD="$QSIPREP_CMD --output-resolution {output_resolution}"
        QSIPREP_CMD="$QSIPREP_CMD --nthreads {threads}"
        QSIPREP_CMD="$QSIPREP_CMD --omp-nthreads {omp_nthreads}"
        QSIPREP_CMD="$QSIPREP_CMD --mem-mb $((1000 * {mem_gb}))"
        QSIPREP_CMD="$QSIPREP_CMD --hmc-model {hmc_model}"
        QSIPREP_CMD="$QSIPREP_CMD --skip-bids-validation"

        if [ "{denoise}" = "true" ]; then
          QSIPREP_CMD="$QSIPREP_CMD --denoise-method dwidenoise"
        fi

        if [ "{unringing}" = "true" ]; then
          QSIPREP_CMD="$QSIPREP_CMD --unringing-method mrdegibbs"
        fi

        if [ "{combine_all_dwis}" = "true" ]; then
          QSIPREP_CMD="$QSIPREP_CMD --combine-all-dwis"
        fi

        set +e
        $QSIPREP_CMD
        QSIPREP_RC=$?
        set -e

        FOUND_OUTPUTS=false
        if find /data/outputs/native/qsiprep -name "*desc-preproc_dwi.nii.gz" 2>/dev/null | grep -q .; then
          FOUND_OUTPUTS=true
        fi

        if $FOUND_OUTPUTS; then
          echo "QSIPrep completed successfully (exit code $QSIPREP_RC, outputs validated)"
        else
          echo "ERROR: QSIPrep failed — expected outputs not found (exit code $QSIPREP_RC)"
          exit 1
        fi

native_outputs:
  preserved: true
  layout: "native/qsiprep/sub-{subject_id}/"

bundle:
  bundle_version: 1
  root: "{run_root}/bundle"
  extraction:
    volumes:
      - from: "{native_root}/sub-{subject_id}/dwi/*desc-preproc_dwi.nii.gz"
        to: "{bundle.root}/volumes/"
        method: copy
    metrics:
      - from: "{native_root}/sub-{subject_id}/dwi/*confounds*.tsv"
        to: "{bundle.root}/metrics/"
        method: copy
    qc:
      - from: "{native_root}/sub-{subject_id}.html"
        to: "{bundle.root}/qc/report.html"
        method: copy

provenance:
  write_run_manifest: true
  record_exact_commands: true
  record_container_digest: true
  record_inputs_hashes: true
