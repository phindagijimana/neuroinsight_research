# Plugin 6: fMRIPrep
id: fmriprep
name: "fMRIPrep"
version: "23.2.1"
type: plugin
domain: functional_mri

visibility:
  user_selectable: true
  ui_category: primary
  ui_label: "fMRIPrep"

description: >
  Preprocessing of functional MRI data including motion correction,
  distortion correction, coregistration to anatomical, and confound
  estimation. Produces BIDS-derivatives outputs.

authors:
  - "NeuroInsight Research Team"
  - "Based on fMRIPrep (Esteban et al., 2019)"

references:
  - "Esteban, O., et al. (2019). fMRIPrep: a robust preprocessing pipeline for functional MRI. Nature Methods, 16(1), 111-116."

container:
  runtime: docker
  image: "nipreps/fmriprep:23.2.1"
  digest: "sha256:9189837e68b0a0c912fad8f0948d74e6280a2d0617b234c8dee738127a035233"

inputs:
  required:
    - key: bids_dir
      type: directory
      description: "BIDS-formatted dataset directory"
    - key: subject_id
      type: string
      description: "Subject identifier (without 'sub-' prefix)"
  optional:
    - key: fs_license
      type: path
      description: "FreeSurfer license file path"
    - key: output_spaces
      type: string
      default: "MNI152NLin2009cAsym"
      description: "Output space(s) for preprocessing"
    - key: fs_subjects_dir
      type: directory
      default: ""
      description: "Path to existing FreeSurfer SUBJECTS_DIR (skips recon-all if provided)"

input_format:
  format_name: "BIDS"
  description: "Brain Imaging Data Structure. A standardized folder layout for neuroimaging datasets."
  notes:
    - "The dataset must pass BIDS validation (bids-validator)"
    - "At minimum, an anatomical T1w and functional BOLD are required"
    - "Fieldmaps are optional but recommended for distortion correction"
    - "Requires FreeSurfer license (free): https://surfer.nmr.mgh.harvard.edu/registration.html"
  example_structure: |
    bids_dir/
      dataset_description.json
      participants.tsv
      sub-01/
        anat/
          sub-01_T1w.nii.gz
          sub-01_T1w.json
        func/
          sub-01_task-rest_bold.nii.gz
          sub-01_task-rest_bold.json
        fmap/                          (optional)
          sub-01_phasediff.nii.gz
          sub-01_magnitude1.nii.gz
  file_types:
    - ".nii.gz (NIfTI images)"
    - ".json (BIDS sidecar metadata)"
    - ".tsv (participant/event tables)"

parameters:
  - name: task
    type: string
    default: ""
    description: "Task to preprocess (empty = all tasks)"
  - name: dummy_scans
    type: int
    default: 0
    min_value: 0
    max_value: 20
    description: "Number of non-steady-state volumes to discard"
  - name: use_aroma
    type: bool
    default: false
    description: "Enable ICA-AROMA denoising"
  - name: ignore_fieldmaps
    type: bool
    default: false
    description: "Skip distortion correction even if fieldmaps present"

resources:
  profiles:
    default:
      cpus: 16
      mem_gb: 64
      time_hours: 48
      gpus: 0

execution:
  style: single_stage
  workdirs:
    native_root: "{run_root}/native/fmriprep"
    logs_dir: "{run_root}/logs/fmriprep"
  environment:
    FS_LICENSE: "{inputs.fs_license}"

  stages:
    - id: fmriprep_run
      kind: single
      profile: default
      command_template: |
        #!/bin/bash
        set -e

        mkdir -p /data/outputs/native/fmriprep
        mkdir -p /data/outputs/logs/fmriprep
        mkdir -p /data/outputs/work/fmriprep
        mkdir -p /data/outputs/bundle/provenance

        # Non-blocking metadata audit for provenance visibility.
        AUDIT_FILE="/data/outputs/bundle/provenance/metadata_audit.txt"
        SUBJECT_ID="{subject_id}"
        {
          echo "NeuroInsight metadata audit"
          echo "pipeline: fmriprep"
          echo "subject: sub-${SUBJECT_ID}"
          echo "bids_dir: /data/inputs/bids_dir"
          echo "timestamp_utc: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo
        } > "$AUDIT_FILE"

        echo "status: WARN_AND_CONTINUE" >> "$AUDIT_FILE"
        SUBJ_DIR="/data/inputs/bids_dir/sub-${SUBJECT_ID}"
        if [ ! -d "$SUBJ_DIR" ]; then
          echo "WARNING: subject directory missing: $SUBJ_DIR" >> "$AUDIT_FILE"
        else
          echo "[fmriprep_critical_bold_keys]" >> "$AUDIT_FILE"
          FUNC_COUNT=0
          while IFS= read -r jf; do
            [ -n "$jf" ] || continue
            FUNC_COUNT=$((FUNC_COUNT + 1))
            missing=""
            for key in RepetitionTime SliceTiming PhaseEncodingDirection TotalReadoutTime EchoTime; do
              if ! grep -q "\"$key\"" "$jf"; then
                missing="${missing}${key}, "
              fi
            done
            if [ -z "$missing" ]; then
              echo "- ${jf#/data/inputs/bids_dir/} :: OK" >> "$AUDIT_FILE"
            else
              echo "- ${jf#/data/inputs/bids_dir/} :: MISSING ${missing%, }" >> "$AUDIT_FILE"
            fi
          done < <(find "$SUBJ_DIR" -path "*/func/*_bold.json" -type f 2>/dev/null | sort)
          if [ "$FUNC_COUNT" -eq 0 ]; then
            echo "WARNING: no BOLD sidecars found" >> "$AUDIT_FILE"
          fi
          echo >> "$AUDIT_FILE"

          echo "[fmriprep_warn_bold_keys]" >> "$AUDIT_FILE"
          while IFS= read -r jf; do
            [ -n "$jf" ] || continue
            if grep -q "\"TaskName\"" "$jf"; then
              echo "- ${jf#/data/inputs/bids_dir/} :: TaskName present" >> "$AUDIT_FILE"
            else
              echo "- ${jf#/data/inputs/bids_dir/} :: WARNING missing TaskName" >> "$AUDIT_FILE"
            fi
          done < <(find "$SUBJ_DIR" -path "*/func/*_bold.json" -type f 2>/dev/null | sort)
          echo >> "$AUDIT_FILE"

          echo "[fmriprep_fieldmap_keys]" >> "$AUDIT_FILE"
          FMAP_COUNT=0
          while IFS= read -r jf; do
            [ -n "$jf" ] || continue
            FMAP_COUNT=$((FMAP_COUNT + 1))
            missing=""
            for key in IntendedFor PhaseEncodingDirection TotalReadoutTime EchoTime; do
              if ! grep -q "\"$key\"" "$jf"; then
                missing="${missing}${key}, "
              fi
            done
            if [ -z "$missing" ]; then
              echo "- ${jf#/data/inputs/bids_dir/} :: OK" >> "$AUDIT_FILE"
            else
              echo "- ${jf#/data/inputs/bids_dir/} :: MISSING ${missing%, }" >> "$AUDIT_FILE"
            fi
          done < <(find "$SUBJ_DIR" -path "*/fmap/*.json" -type f 2>/dev/null | sort)
          if [ "$FMAP_COUNT" -eq 0 ]; then
            echo "none" >> "$AUDIT_FILE"
          fi
        fi
        echo >> "$AUDIT_FILE"
        echo "note: this audit is informational and does not block execution." >> "$AUDIT_FILE"

        FMRIPREP_CMD="fmriprep /data/inputs/bids_dir /data/outputs/native/fmriprep participant"
        FMRIPREP_CMD="$FMRIPREP_CMD --work-dir /data/outputs/work/fmriprep"
        FMRIPREP_CMD="$FMRIPREP_CMD --participant-label {subject_id}"
        FMRIPREP_CMD="$FMRIPREP_CMD --output-spaces {output_spaces}"
        FMRIPREP_CMD="$FMRIPREP_CMD --nthreads {threads}"
        FMRIPREP_CMD="$FMRIPREP_CMD --omp-nthreads {omp_nthreads}"
        FMRIPREP_CMD="$FMRIPREP_CMD --mem-mb $((1000 * {mem_gb}))"
        FMRIPREP_CMD="$FMRIPREP_CMD --fs-license-file ${FS_LICENSE:-/opt/freesurfer/license.txt}"
        FMRIPREP_CMD="$FMRIPREP_CMD --skip_bids_validation"

        if [ -n "{task}" ]; then
          FMRIPREP_CMD="$FMRIPREP_CMD --task-id {task}"
        fi

        if [ "{dummy_scans}" -gt 0 ]; then
          FMRIPREP_CMD="$FMRIPREP_CMD --dummy-scans {dummy_scans}"
        fi

        if [ "{use_aroma}" = "true" ]; then
          FMRIPREP_CMD="$FMRIPREP_CMD --use-aroma"
        fi

        if [ "{ignore_fieldmaps}" = "true" ]; then
          FMRIPREP_CMD="$FMRIPREP_CMD --ignore fieldmaps"
        fi

        if [ -n "{fs_subjects_dir}" ] && [ -d "/data/inputs/fs_subjects_dir" ]; then
          FMRIPREP_CMD="$FMRIPREP_CMD --fs-subjects-dir /data/inputs/fs_subjects_dir"
          echo "Using existing FreeSurfer outputs from /data/inputs/fs_subjects_dir (skipping recon-all)"
        fi

        # fMRIPrep sometimes returns exit code 1 despite successful processing
        # (e.g. deprecation warnings, non-critical FreeSurfer issues).
        # Capture the exit code and validate by checking outputs instead.
        set +e
        $FMRIPREP_CMD
        FMRIPREP_RC=$?
        set -e

        FOUND_OUTPUTS=false
        if find /data/outputs/native/fmriprep -name "*desc-preproc_bold.nii.gz" 2>/dev/null | grep -q .; then
          FOUND_OUTPUTS=true
        fi

        if $FOUND_OUTPUTS; then
          echo "fMRIPrep completed successfully (exit code $FMRIPREP_RC, outputs validated)"
        else
          echo "ERROR: fMRIPrep failed — expected outputs not found (exit code $FMRIPREP_RC)"
          exit 1
        fi

native_outputs:
  preserved: true
  layout: "native/fmriprep/sub-{subject_id}/"

bundle:
  bundle_version: 1
  root: "{run_root}/bundle"
  extraction:
    volumes:
      - from: "{native_root}/sub-{subject_id}/func/*desc-preproc_bold.nii.gz"
        to: "{bundle.root}/volumes/"
        method: copy
    metrics:
      - from: "{native_root}/sub-{subject_id}/func/*confounds_timeseries.tsv"
        to: "{bundle.root}/metrics/"
        method: copy
    qc:
      - from: "{native_root}/sub-{subject_id}.html"
        to: "{bundle.root}/qc/report.html"
        method: copy

provenance:
  write_run_manifest: true
  record_exact_commands: true
  record_container_digest: true
  record_inputs_hashes: true
