# Plugin: Source localization / inverse (MNE dSPM-style)
id: source_localization
name: "EEG Source Localization"
version: "1.0.0"
type: plugin
domain: eeg_imaging

visibility:
  user_selectable: true
  ui_category: primary
  ui_label: "EEG Source Localization"

description: >
  Minimum-norm / dSPM-style inverse using cleaned EEG, optional spike events TSV,
  and a precomputed forward_solution.fif.

authors:
  - "NeuroInsight Research Team"

references:
  - "https://mne.tools/stable/auto_tutorials/inverse/30_mne_dspm_loreta.html"

container:
  runtime: docker
  image: "phindagijimana321/eeg-source-localization-mne:1.0.3"
  digest: "sha256:1ee9d575de99953a657bbfd431205518bf3faafae695ecc1ebe3df0e47df1c8d"

inputs:
  required: []
  optional: []

input_format:
  format_name: "FIF + forward + optional events TSV"
  description: "eeg/clean_raw.fif, models/forward_solution.fif, optional events/spike_events.tsv"

parameters: []

resources:
  profiles:
    default:
      cpus: 4
      mem_gb: 16
      time_hours: 4
      gpus: 0

execution:
  style: single_stage
  workdirs:
    native_root: "{run_root}/native/source_localization"
    logs_dir: "{run_root}/logs/source_localization"
  stages:
    - id: inverse
      kind: single
      profile: default
      command_template: |
        #!/bin/bash
        set -e
        export NIR_INPUT_ROOT=/data/inputs
        export NIR_OUTPUT_ROOT=/data/outputs/native/source_localization
        mkdir -p "$NIR_OUTPUT_ROOT" /data/outputs/logs/source_localization
        python /app/run.py

provenance:
  write_run_manifest: true
  record_exact_commands: true
  record_container_digest: true
