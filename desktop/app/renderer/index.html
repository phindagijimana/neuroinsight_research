<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Control Center — NeuroInsight Research</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: #f1f5f9;
        color: #0f172a;
        font-size: 14px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      /* ── Layout ─────────────────────────────────────────── */
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 24px;
        background: #fff;
        border-bottom: 1px solid #e2e8f0;
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .brand { display: flex; align-items: baseline; gap: 10px; }
      .brand-name { font-size: 15px; font-weight: 600; color: #0f172a; }
      .brand-name em { color: #0b4ea2; font-style: normal; }
      .brand-tag {
        font-size: 11px;
        font-weight: 500;
        color: #94a3b8;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .header-pills { display: flex; gap: 6px; align-items: center; }

      main {
        max-width: 560px;
        margin: 24px auto;
        padding: 0 16px 48px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      /* ── Cards ──────────────────────────────────────────── */
      .card {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 1px 3px rgba(0,0,0,.04);
      }

      /* ── Status block ───────────────────────────────────── */
      .status-block {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 18px;
      }
      .status-left { display: flex; align-items: center; gap: 12px; }
      .status-dot {
        width: 12px; height: 12px; border-radius: 50%;
        background: #cbd5e1; flex-shrink: 0;
        box-shadow: 0 0 0 3px rgba(203,213,225,.3);
        transition: background .3s, box-shadow .3s;
      }
      .status-dot.on {
        background: #16a34a;
        box-shadow: 0 0 0 3px rgba(22,163,74,.15);
      }
      .status-dot.off {
        background: #dc2626;
        box-shadow: 0 0 0 3px rgba(220,38,38,.12);
      }
      .status-label { font-size: 15px; font-weight: 600; }
      .status-sub { font-size: 12px; color: #64748b; margin-top: 1px; }

      /* ── Buttons ────────────────────────────────────────── */
      .btn {
        display: inline-flex; align-items: center; justify-content: center;
        gap: 6px; border-radius: 8px; font-size: 13px; font-weight: 500;
        padding: 8px 14px; cursor: pointer; transition: background .15s, opacity .15s;
        border: 1px solid transparent; white-space: nowrap;
      }
      .btn:disabled { opacity: 0.45; cursor: not-allowed; }

      .btn-primary {
        background: #0b4ea2; color: #fff;
        border-color: #0b4ea2; width: 100%;
        padding: 11px 14px; font-size: 14px;
        border-radius: 9px; margin-bottom: 14px;
      }
      .btn-primary:hover:not(:disabled) { background: #0a45909; }

      .btn-secondary {
        background: #fff; color: #374151;
        border-color: #d1d5db;
      }
      .btn-secondary:hover:not(:disabled) { background: #f9fafb; }

      .btn-ghost {
        background: transparent; color: #64748b;
        border-color: transparent; font-size: 12px; padding: 4px 8px;
      }
      .btn-ghost:hover:not(:disabled) { color: #0f172a; }

      .btn-danger { color: #b91c1c; border-color: #fecaca; }
      .btn-danger:hover:not(:disabled) { background: #fef2f2; }

      .btn-row {
        display: flex; gap: 8px; flex-wrap: wrap;
      }

      /* ── Pills (header) ─────────────────────────────────── */
      .pill {
        display: inline-flex; align-items: center; gap: 5px;
        font-size: 11px; font-weight: 500;
        padding: 3px 9px; border-radius: 9999px;
        background: #f1f5f9; color: #64748b;
        border: 1px solid #e2e8f0;
        transition: all .2s;
      }
      .pill .dot { width: 6px; height: 6px; border-radius: 50%; background: #cbd5e1; }
      .pill.ok { background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }
      .pill.ok .dot { background: #16a34a; }
      .pill.warn { background: #fffbeb; color: #92400e; border-color: #fde68a; }
      .pill.warn .dot { background: #f59e0b; }
      .pill.bad { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
      .pill.bad .dot { background: #dc2626; }

      /* ── Preflight output ───────────────────────────────── */
      .preflight-wrap {
        margin-top: 12px;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 10px 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11.5px;
        color: #334155;
        max-height: 200px;
        overflow-y: auto;
        white-space: pre-wrap;
        display: none;
      }
      .preflight-wrap.visible { display: block; }

      /* ── Collapsible sections ───────────────────────────── */
      details.card { padding: 0; overflow: hidden; }
      details.card summary {
        display: flex; align-items: center; justify-content: space-between;
        padding: 16px 20px; cursor: pointer;
        font-size: 13px; font-weight: 600; color: #374151;
        list-style: none; user-select: none;
        -webkit-user-select: none;
      }
      details.card summary::-webkit-details-marker { display: none; }
      details.card summary::after {
        content: "›";
        font-size: 18px; color: #94a3b8;
        transition: transform .2s;
        line-height: 1;
      }
      details.card[open] summary::after { transform: rotate(90deg); }
      details.card summary:hover { background: #f8fafc; }
      .detail-body {
        padding: 0 20px 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        border-top: 1px solid #f1f5f9;
      }
      .detail-label {
        font-size: 12px; font-weight: 500; color: #64748b;
        text-transform: uppercase; letter-spacing: 0.05em;
        margin-top: 4px;
      }

      /* ── Inputs ─────────────────────────────────────────── */
      input[type="text"], input[type="password"], select, textarea {
        width: 100%;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 13px;
        font-family: inherit;
        color: #0f172a;
        background: #fff;
        outline: none;
        transition: border-color .15s;
      }
      input:focus, select:focus, textarea:focus { border-color: #0b4ea2; }
      textarea {
        min-height: 80px; resize: vertical;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
      }

      /* ── Status toast ───────────────────────────────────── */
      #statusToast {
        font-size: 12px; color: #475569;
        padding: 10px 14px;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        display: none;
      }
      #statusToast.visible { display: block; }
      #statusToast.ok { background: #f0fdf4; border-color: #bbf7d0; color: #15803d; }
      #statusToast.err { background: #fef2f2; border-color: #fecaca; color: #b91c1c; }

      /* ── Footer ─────────────────────────────────────────── */
      footer {
        font-size: 11px; color: #94a3b8;
        text-align: center; margin-top: 4px;
        padding: 0 4px;
        line-height: 1.6;
      }

      /* ── Summary badge ──────────────────────────────────── */
      .summary-badge {
        font-size: 11px; font-weight: 500;
        padding: 2px 8px; border-radius: 9999px;
        background: #f1f5f9; color: #64748b;
        border: 1px solid #e2e8f0;
        margin-left: 8px;
      }
      .summary-badge.ok { background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }
      .summary-badge.bad { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">
        <span class="brand-name">NeuroInsight <em>Research</em></span>
        <span class="brand-tag">Control Center</span>
      </div>
      <div class="header-pills">
        <span class="pill" id="licensePill"><span class="dot"></span><span id="licensePillText">License</span></span>
        <span class="pill" id="lockPill"><span class="dot"></span><span id="lockPillText">Lock</span></span>
      </div>
    </header>

    <main>

      <!-- Backend -->
      <div class="card">
        <div class="status-block">
          <div class="status-left">
            <span class="status-dot" id="statusDot"></span>
            <div>
              <div class="status-label" id="statusLabel">Checking…</div>
              <div class="status-sub" id="statusText"></div>
            </div>
          </div>
          <button class="btn btn-ghost" id="refreshBtn">Refresh</button>
        </div>

        <button class="btn btn-primary" id="openBtn">Open NeuroInsight Research</button>

        <div class="btn-row">
          <button class="btn btn-secondary" id="startBtn">Start</button>
          <button class="btn btn-secondary" id="stopAppBtn">Stop Services</button>
          <button class="btn btn-secondary btn-danger" id="stopAllBtn">Stop All</button>
        </div>
      </div>

      <!-- Status toast -->
      <div id="statusToast"></div>

      <!-- Diagnostics -->
      <div class="card">
        <div class="btn-row">
          <button class="btn btn-secondary" id="preflightBtn">Run Preflight</button>
          <button class="btn btn-secondary" id="diagBtn">Export Diagnostics</button>
        </div>
        <div class="preflight-wrap" id="preflightOut"></div>
      </div>

      <!-- License -->
      <details class="card">
        <summary>
          <span>License <span class="summary-badge" id="licenseBadge">Unknown</span></span>
        </summary>
        <div class="detail-body">
          <div class="status-sub" id="licenseStatusText">No license imported.</div>
          <div class="btn-row">
            <button class="btn btn-secondary" id="licenseImportFileBtn">Import File</button>
            <button class="btn btn-ghost" id="licenseRefreshBtn">Refresh</button>
          </div>
          <div class="detail-label">Or paste license JSON</div>
          <textarea id="licenseText" placeholder='{"payload": {...}, "signature": "..."}'></textarea>
          <div class="btn-row">
            <button class="btn btn-secondary" id="licenseImportTextBtn">Import Text</button>
          </div>
        </div>
      </details>

      <!-- App Lock -->
      <details class="card">
        <summary>
          <span>App Lock <span class="summary-badge" id="lockBadge">Disabled</span></span>
        </summary>
        <div class="detail-body">
          <div class="status-sub" id="lockStatusText">App lock is disabled.</div>
          <input id="lockPin" type="password" placeholder="PIN (minimum 6 characters)" />
          <div class="btn-row">
            <button class="btn btn-secondary" id="lockEnableBtn">Enable</button>
            <button class="btn btn-secondary" id="lockDisableBtn">Disable</button>
            <button class="btn btn-secondary" id="lockUnlockBtn">Unlock</button>
            <button class="btn btn-secondary btn-danger" id="lockNowBtn">Lock Now</button>
          </div>
        </div>
      </details>

      <!-- Credential Vault -->
      <details class="card">
        <summary>
          <span>Credential Vault <span class="summary-badge" id="vaultBadge">…</span></span>
        </summary>
        <div class="detail-body">
          <div class="status-sub" id="vaultStatusText">Vault status unknown.</div>
          <select id="secretPreset">
            <option value="">Preset key…</option>
            <option value="pennsieve.api_key">pennsieve.api_key</option>
            <option value="pennsieve.api_secret">pennsieve.api_secret</option>
            <option value="hpc.username">hpc.username</option>
            <option value="hpc.private_key">hpc.private_key</option>
            <option value="xnat.username">xnat.username</option>
            <option value="xnat.password">xnat.password</option>
          </select>
          <input id="secretKey" type="text" placeholder="Key (e.g. pennsieve.api_key)" />
          <input id="secretValue" type="password" placeholder="Value" />
          <div class="btn-row">
            <button class="btn btn-secondary" id="saveSecretBtn">Save</button>
            <button class="btn btn-secondary" id="loadSecretBtn">Load</button>
            <button class="btn btn-secondary btn-danger" id="deleteSecretBtn">Delete</button>
          </div>
        </div>
      </details>

      <footer id="pathsText"></footer>
    </main>

    <!-- Hidden stubs for renderer.js backward compat -->
    <div id="logOut" style="display:none"></div>
    <button id="controlBtn" style="display:none"></button>
    <button id="lockRefreshBtn" style="display:none"></button>
    <button id="vaultStatusBtn" style="display:none"></button>

    <script src="./renderer.js"></script>
  </body>
</html>
