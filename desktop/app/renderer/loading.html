<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuroInsight Research</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        height: 100%;
        background: #0b1929;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        color: #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        -webkit-user-select: none;
      }
      .container { text-align: center; padding: 40px; min-width: 360px; }
      .logo { font-size: 28px; font-weight: 700; color: #fff; letter-spacing: -0.5px; margin-bottom: 4px; }
      .logo span { color: #3b82f6; }
      .tagline { font-size: 12px; color: #475569; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 48px; }
      .spinner {
        width: 32px; height: 32px;
        border: 3px solid #1e3a5f;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.75s linear infinite;
        margin: 0 auto 32px;
      }
      .spinner.hidden { visibility: hidden; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .steps { list-style: none; text-align: left; display: inline-block; min-width: 280px; }
      .steps li {
        display: flex; align-items: center; gap: 10px;
        font-size: 13px; color: #475569;
        padding: 5px 0;
        transition: color 0.2s;
      }
      .detail { font-size: 11px; color: #334155; margin-left: auto; }
      .steps li.running { color: #94a3b8; }
      .steps li.done { color: #4ade80; }
      .steps li.error { color: #f87171; }
      .steps li.skipped { color: #64748b; }
      .icon { width: 16px; text-align: center; flex-shrink: 0; }
      .dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: #1e3a5f; margin: 0 4px;
        display: inline-block;
      }
      .spin-sm {
        display: inline-block; width: 12px; height: 12px;
        border: 2px solid #1e3a5f; border-top-color: #3b82f6;
        border-radius: 50%; animation: spin 0.75s linear infinite;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">NeuroInsight <span>Research</span></div>
      <div class="tagline">Neuroimaging Research Platform</div>
      <div class="spinner" id="spinner"></div>
      <ul class="steps" id="steps"></ul>
    </div>
    <script>
      /* global nirDesktop */
      const stepsEl = document.getElementById("steps");
      const spinner = document.getElementById("spinner");
      const stepMap = {};

      const icons = {
        pending:  '<span class="dot"></span>',
        running:  '<span class="spin-sm"></span>',
        done:     '✓',
        error:    '✗',
        skipped:  '–',
      };

      function upsertStep(msg) {
        const { step, label, status, detail } = msg;
        if (stepMap[step]) {
          const li = stepMap[step];
          li.className = status;
          li.querySelector(".icon").innerHTML = icons[status] || icons.pending;
          li.querySelector(".label").textContent = label;
          const detailEl = li.querySelector(".detail");
          if (detail) {
            detailEl.textContent = detail;
          } else {
            detailEl.textContent = "";
          }
        } else {
          const li = document.createElement("li");
          li.className = status || "pending";
          li.innerHTML = `<span class="icon">${icons[status] || icons.pending}</span><span class="label">${label}</span><span class="detail">${detail || ""}</span>`;
          stepsEl.appendChild(li);
          stepMap[step] = li;
        }
        if (status === "error") {
          spinner.classList.add("hidden");
        }
      }

      if (typeof nirDesktop !== "undefined" && nirDesktop.onSetupProgress) {
        nirDesktop.onSetupProgress((msg) => {
          upsertStep(msg);
        });
      }
    </script>
  </body>
</html>
