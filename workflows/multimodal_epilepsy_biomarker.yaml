# Workflow: Multimodal Epilepsy Biomarker
# Full nine-step chain: EEG branch (incl. BEM/source space), structural MRI, ROI fusion, scoring.
id: multimodal_epilepsy_biomarker
name: "Multimodal Epilepsy Biomarker"
version: "1.0.1"
type: workflow
domain: eeg_imaging

description: >
  Combines EEG source localization with FreeSurfer volumetric segmentation, extracts ROI-level multimodal features, and produces biomarker summaries (laterality, concordance, and viewer-ready output).

# Manifest digests (linux/amd64) for each step’s plugin container; keep in sync
# with plugins/*.yaml container.image and container.digest.
pinned_plugin_containers:
  - plugin_id: eeg_preprocessing
    image: "phindagijimana321/eeg-preprocessing-mne:1.0.3"
    digest: "sha256:ba517d60cf14998b2bc908cc21fb11cc6441eeb0dff55c62da187b4e3bab0b01"
  - plugin_id: spike_detection
    image: "phindagijimana321/eeg-spike-detection-mne:1.0.1"
    digest: "sha256:89a2e5c524efdbfe7a456e4d61847980978306bf36564e7bd496fd1bf9153713"
  - plugin_id: eeg_mri_coregistration
    image: "phindagijimana321/eeg-mri-coregistration-mne:1.0.2"
    digest: "sha256:8250c5091045978e0761dcb34bfa954a3fa2ce5f0b7c0fbaa2271634fe677636"
  - plugin_id: bem_source_space
    image: "phindagijimana321/eeg-bem-source-space-mne:1.0.0"
    digest: "sha256:bb7eb200417eaa9d1b72ed3253baaf7513c23b51ffdfdee587bc7205398a3793"
  - plugin_id: forward_model
    image: "phindagijimana321/eeg-forward-model-mne:1.0.10"
    digest: "sha256:ad8ee2781cbc95927e3eb6c026c51effc2c97d0909c1778806e6dd51d54b03de"
  - plugin_id: source_localization
    image: "phindagijimana321/eeg-source-localization-mne:1.0.3"
    digest: "sha256:1ee9d575de99953a657bbfd431205518bf3faafae695ecc1ebe3df0e47df1c8d"
  - plugin_id: mri_segmentation
    image: "phindagijimana321/freesurfer-autorecon-volonly:7.4.1"
    digest: "sha256:dce99940b0f1e606c6457ea5e2e36a9f5f0ca4da1b2fd612cd97f5d69623c684"
  - plugin_id: roi_feature_extraction
    image: "phindagijimana321/eeg-roi-feature-extraction:1.0.1"
    digest: "sha256:fd4218fc7a83ffc6d57e3949590b7b700c4195c8dd8f4b04425258312cd6d2e9"
  - plugin_id: biomarker_scoring
    image: "phindagijimana321/eeg-biomarker-scoring:1.0.0"
    digest: "sha256:8d20a3d922b99ee273c7e2cf59c77f47d9cc4c4913564756c91cef277e1d32c0"

developer_contract: >
  Workflows only orchestrate plugins. T1 for mri_segmentation should be staged
  as /data/inputs/T1w.nii.gz for the FreeSurfer-based step; EEG/MNE paths follow
  individual plugin input_format sections.

authors:
  - "NeuroInsight Research Team"

inputs:
  required:
    - key: input_dir
      type: directory
      description: >
        Single staging folder on disk: must contain the EEG layout (default eeg/raw/) and
        T1w.nii.gz (or symlink) in the same directory. Do not split EEG and MRI across
        separate parent folders; copy or link both into one run folder before submitting.
    - key: T1w
      type: nifti
      description: >
        T1-weighted MRI for FreeSurfer vol-only segmentation; must live under the same
        staging directory as input_dir (submission API enforces one folder).
  optional:
    - key: eeg_raw_path
      type: string
      default: "eeg/raw"
    - key: subject_id
      type: string
      default: "subject"
      description: "Subject id for FreeSurfer -s and downstream artifacts."
    - key: fs_license
      type: path
      description: "FreeSurfer license.txt"
    - key: threads
      type: int
      default: 8
      description: "OpenMP threads for recon-all (mri_segmentation)."

input_format:
  format_name: "EEG + T1 MRI (+ BEM optional)"
  description: >
    Multimodal staging: continuous EEG, T1 NIfTI for segmentation, and inputs
    required by coregistration/forward/source plugins.
  example_structure: |
    run_inputs/
      eeg/raw/...
      T1w.nii.gz
      models/
        src.fif
        bem_sol.fif
      mri/bem/...

validation:
  preflight_checks:
    - "directory_exists(input_dir)"
    - "nifti_readable(T1w)"
  staging_rule: >
    All workflow inputs must be under one staging directory (EEG + T1 together).

# Steps run in order (see Celery workflow runner). EEG source branch first,
# then structural MRI segmentation, then ROI fusion and biomarker scoring.
steps:
  - id: eeg_preprocessing
    uses: eeg_preprocessing
    with:
      eeg_raw_path: "{inputs.eeg_raw_path}"

  - id: spike_detection
    uses: spike_detection
    depends_on:
      - eeg_preprocessing

  - id: eeg_mri_coregistration
    uses: eeg_mri_coregistration
    depends_on:
      - spike_detection

  - id: bem_source_space
    uses: bem_source_space
    depends_on:
      - eeg_mri_coregistration

  - id: forward_model
    uses: forward_model
    depends_on:
      - bem_source_space

  - id: source_localization
    uses: source_localization
    depends_on:
      - forward_model

  - id: mri_segmentation
    uses: mri_segmentation
    with:
      T1w: "{inputs.T1w}"
      subject_id: "{inputs.subject_id}"
      fs_license: "{inputs.fs_license}"
      threads: "{inputs.threads}"

  - id: roi_feature_extraction
    uses: roi_feature_extraction
    depends_on:
      - source_localization
      - mri_segmentation

  - id: biomarker_scoring
    uses: biomarker_scoring
    depends_on:
      - roi_feature_extraction

outputs:
  native:
    - "{run_root}/native/eeg_preprocessing"
    - "{run_root}/native/spike_detection"
    - "{run_root}/native/eeg_mri_coregistration"
    - "{run_root}/native/bem_source_space"
    - "{run_root}/native/forward_model"
    - "{run_root}/native/source_localization"
    - "{run_root}/native/mri_segmentation"
    - "{run_root}/native/roi_feature_extraction"
    - "{run_root}/native/biomarker_scoring"
  bundle:
    - "{run_root}/bundle"

reproducibility:
  pin_containers: true
  write_run_manifest: true
  store_exact_commands: true
