# Workflow: FreeSurfer Longitudinal Full
# Combines longitudinal recon-all (CROSS -> BASE -> LONG) with
# post-processing stats extraction into one end-to-end workflow.
id: wf_freesurfer_longitudinal_full
name: "FreeSurfer Longitudinal Full"
version: "1.0.0"
type: workflow
domain: structural_mri

description: >
  End-to-end FreeSurfer longitudinal analysis. Runs the full recon-all
  longitudinal stream (CROSS -> BASE -> LONG) for >=2 timepoints, then
  automatically extracts QDEC-style tables and longitudinal slopes from
  the results.

developer_contract: >
  Workflows only orchestrate plugins. No direct execution steps allowed.
  Step 1 produces the SUBJECTS_DIR; Step 2 reads it to extract stats.

inputs:
  required:
    - key: timepoints
      type: list
      min_items: 2
      item_schema:
        - key: tp_id
          type: string
        - key: T1w
          type: nifti
  optional:
    - key: base_id
      type: string
      default: "base_template"
    - key: subjects_dir
      type: path
    - key: fs_license
      type: path
    - key: resume
      type: bool
      default: true
    - key: parallelism
      type: object
      properties:
        max_parallel_cross: { type: int, default: 2 }
        max_parallel_long: { type: int, default: 2 }
    - key: run_slopes
      type: bool
      default: true
      description: "Compute longitudinal slopes after stats extraction"

input_format:
  format_name: "Multiple Timepoint NIfTIs"
  description: "Two or more T1-weighted scans from different timepoints for the same subject."
  example_structure: |
    timepoint files:
      sub-01_ses-baseline_T1w.nii.gz
      sub-01_ses-followup_T1w.nii.gz
      sub-01_ses-year2_T1w.nii.gz    (optional additional timepoints)

validation:
  preflight_checks:
    - "timepoints_count(timepoints) >= 2"
    - "all_tp_id_unique(timepoints[].tp_id)"
    - "all_nifti_readable(timepoints[].T1w)"

steps:
  # Step 1: Full longitudinal recon-all (CROSS -> BASE -> LONG)
  - id: longitudinal
    uses: freesurfer_longitudinal
    with:
      timepoints: "{inputs.timepoints}"
      base_id: "{inputs.base_id}"
      subjects_dir: "{inputs.subjects_dir}"
      fs_license: "{inputs.fs_license}"
      resume: "{inputs.resume}"
      parallelism: "{inputs.parallelism}"

  # Step 2: Extract stats, QDEC tables, and slopes from LONG outputs
  - id: longitudinal_stats
    uses: freesurfer_longitudinal_stats
    depends_on: longitudinal
    with:
      subjects_dir: "{steps.longitudinal.outputs.subjects_dir}"
      base_id: "{inputs.base_id}"
      timepoints: "{inputs.timepoints}"
      fs_license: "{inputs.fs_license}"
      run_slopes: "{inputs.run_slopes}"

outputs:
  native:
    - "{run_root}/native/freesurfer/SUBJECTS_DIR"
  bundle:
    - "{run_root}/bundle"
    - "{run_root}/bundle/metrics/qdec_table_template.tsv"
    - "{run_root}/bundle/metrics/longitudinal_slopes.json"
    - "{run_root}/bundle/metrics/longitudinal_postprocess_summary.json"

reproducibility:
  pin_containers: true
  write_run_manifest: true
  store_exact_commands: true
